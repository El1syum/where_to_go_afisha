name: Build & Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/el1syum/where_to_go_afisha/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  build-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ghcr.io/el1syum/where_to_go_afisha/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  deploy:
    needs: [build-web, build-worker]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/afisha
            git checkout -- docker-compose.prod.yml
            git pull origin main

            sed -i 's|certbot_data:/etc/letsencrypt|/etc/letsencrypt:/etc/letsencrypt|' docker-compose.prod.yml
            sed -i 's|certbot_www:/var/www/certbot|/var/www/certbot:/var/www/certbot|' docker-compose.prod.yml

            docker pull ghcr.io/el1syum/where_to_go_afisha/web:latest
            docker pull ghcr.io/el1syum/where_to_go_afisha/worker:latest

            docker compose -f docker-compose.prod.yml up -d --force-recreate --no-build
            docker image prune -af
            echo "Deploy complete!"
