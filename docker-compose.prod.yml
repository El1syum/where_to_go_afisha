services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: afisha
      POSTGRES_USER: afisha
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afisha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  web:
    image: ghcr.io/el1syum/where_to_go_afisha/web:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://afisha:${DB_PASSWORD}@postgres:5432/afisha
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${SITE_URL}
      NEXT_PUBLIC_SITE_URL: ${SITE_URL}
      NEXT_PUBLIC_YAN_SIDEBAR: ${YAN_SIDEBAR:-}
      NEXT_PUBLIC_YAN_BOTTOM: ${YAN_BOTTOM:-}
      NEXT_PUBLIC_YAN_CONTENT: ${YAN_CONTENT:-}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    image: ghcr.io/el1syum/where_to_go_afisha/worker:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://afisha:${DB_PASSWORD}@postgres:5432/afisha
      REDIS_URL: redis://redis:6379
      XML_FEED_URL: ${XML_FEED_URL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - certbot_data:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - web

volumes:
  postgres_data:
  redis_data:
  certbot_data:
  certbot_www:
